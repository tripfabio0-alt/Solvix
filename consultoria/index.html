<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | crIArc Consultoria Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">▲</span> crIArc
                </div>
                <h2>Consultoria Pro</h2>
                <p>Faça login para acessar o ecossistema</p>
            </div>
            
            <div class="auth-actions">
                <!-- Botão placeholder preparado para receber o script do Supabase OAuth -->
                <button class="btn-google" id="loginBtn" onclick="window.location.href='dashboard.html'">
                    <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google Logo" class="google-icon">
                    Continuar com Google
                </button>
            </div>

            <div class="auth-footer">
                <p>Ao continuar, você concorda com nossos Termos de Serviço.</p>
                <a href="/" class="back-link">← Voltar para o Site</a>
            </div>
        </div>
    </div>
</body>
</html>
