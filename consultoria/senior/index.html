<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior Rule Generator | Solvix Consultoria Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/consultoria/css/app.css">
    <style>
        body, html { margin: 0; padding: 0; background: var(--bg-color); }
    </style>
    <!-- Supabase SDK & Cliente -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabaseClient.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

const SYSTEM_PROMPT = `Você é um especialista em regras LSP do Senior Gestão Empresarial ERP.
Quando receber uma imagem de tela do sistema Senior, analise os campos, botões e contexto visível para entender o que precisa ser customizado.
Responda EXATAMENTE neste formato com os delimitadores abaixo. Não adicione nada fora dos blocos.

##TITULO##
Título curto da regra
##MODULO##
Módulo (ex: Manufatura, PCP, Mercado)
##IDENTIFICADOR##
Ex: PCP-000XXXXX01
##DESCRICAO##
Descrição funcional de uma linha
##SCRIPT##
@ Script LSP completo com comentários @
Definir Alfa aVariavel;
##VARIAVEIS##
nome|Tipo|Descrição
##FUNCOES##
NomeFuncao|O que faz
##DICAS##
Dica 1
Dica 2
##ATENCAO##
Ponto crítico
##FIM##

Sintaxe LSP Senior: Definir Alfa/Numero/Data; @ comentário @; Se()...FimSe; Enquanto()...FimEnquanto; GeraLog(); Mensagem(); BuscaReg(); GravaReg(); ApontarOPs(); GerarOP(); BaixarComponentes(); Se(aRetorno<>"OK") GeraLog(aRetorno); FimSe;`;

function parseResponse(text) {
  const get = (tag, next) => {
    const start = text.indexOf(`##${tag}##`);
    if (start === -1) return "";
    const after = start + tag.length + 4;
    const end = text.indexOf(`##${next}##`, after);
    return (end === -1 ? text.slice(after) : text.slice(after, end)).trim();
  };
  return {
    titulo: get("TITULO","MODULO"),
    modulo: get("MODULO","IDENTIFICADOR"),
    identificador: get("IDENTIFICADOR","DESCRICAO"),
    descricao: get("DESCRICAO","SCRIPT"),
    script: get("SCRIPT","VARIAVEIS"),
    variaveis: get("VARIAVEIS","FUNCOES").split("\n").filter(Boolean).map(l=>{const [n,t,...r]=l.split("|");return{nome:n?.trim(),tipo:t?.trim(),descricao:r.join("|").trim()};}).filter(v=>v.nome),
    funcoes: get("FUNCOES","DICAS").split("\n").filter(Boolean).map(l=>{const [n,...r]=l.split("|");return{nome:n?.trim(),descricao:r.join("|").trim()};}).filter(f=>f.nome),
    dicas: get("DICAS","ATENCAO").split("\n").filter(Boolean).map(d=>d.trim()).filter(Boolean),
    atencao: get("ATENCAO","FIM"),
  };
}

function fileToBase64(file) {
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

function App() {
  const [input,setInput]=useState("");
  const [image,setImage]=useState(null);
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");
  const [tab,setTab]=useState("script");
  const [copied,setCopied]=useState(false);
  const [dragOver,setDragOver]=useState(false);
  const [mode,setMode]=useState("text");
  const fileRef=useRef();

  const handleFile=async(file)=>{
    if(!file||!file.type.startsWith("image/"))return;
    const base64=await fileToBase64(file);
    setImage({file,base64,preview:URL.createObjectURL(file),mediaType:file.type});
    setMode("image");
  };

  const generate=async()=>{
    if(!input.trim()&&!image)return;
    setLoading(true);setError("");setResult(null);
    try{
      let parts = [];
      if(input.trim()){
        parts.push({ text: input.trim() });
      } else {
        parts.push({ text: "Analise esta tela do Senior e gere a regra LSP adequada conforme o contexto visível." });
      }

      if(mode==="image"&&image){
        parts.push({
          inlineData: {
            mimeType: image.mediaType,
            data: image.base64
          }
        });
      }

      const payload = {
        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: [{ role: "user", parts: parts }]
      };

      // Chamando a Edge Function do Supabase
      const { data, error: invokeError } = await window.supabaseClient.functions.invoke('gemini-proxy', {
        body: payload
      });

      if (invokeError) {
        throw new Error(`Erro na API: ${invokeError.message || 'Falha ao se comunicar com o Supabase'}`);
      }
      
      if (data?.error) {
         throw new Error(`Erro Gemini: ${data.message || 'Falha na resposta do Google'}`);
      }
      const raw=data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
      if(!raw)throw new Error("Resposta vazia da API do Gemini.");
      if(!raw.includes("##TITULO##"))throw new Error("O Gemini retornou em um formato inesperado. Tente novamente.");
      setResult(parseResponse(raw));setTab("script");
    }catch(err){setError(err.message||"Erro desconhecido.");}
    finally{setLoading(false);}
  };

  const copy=()=>{if(!result?.script)return;navigator.clipboard.writeText(result.script);setCopied(true);setTimeout(()=>setCopied(false),2000);};
  const lc=(line)=>{const t=line.trim();if(t.startsWith("@"))return"#64748b";if(/^(Definir|Se|FimSe|Enquanto|FimEnquanto|ParaCada|FimParaCada)\b/i.test(t))return"#93c5fd";if(/^[A-Z][a-zA-Z]+\(/.test(t))return"#86efac";return"#cbd5e1";};
  const ok=(input.trim()||image)&&!loading;

  return(
    <div style={{minHeight:"100vh",background:"var(--bg-color)",fontFamily:"var(--font-body)",color:"var(--text-primary)"}}>

      {/* Header */}
      <div style={{borderBottom:"1px solid var(--border-color)",background:"rgba(5, 5, 10, 0.8)",backdropFilter:"blur(12px)",padding:"18px 32px",display:"flex",alignItems:"center",gap:24,position:"sticky",top:0,zIndex:100}}>
        
        <div style={{fontFamily:"var(--font-heading)", fontSize:18, fontWeight:700, display:"flex", alignItems:"center", gap:16, color:"var(--text-primary)"}}>
            <span style={{display:"flex", alignItems:"center", gap:20}}>
              <img src="/Logo.png" alt="Solvix" style={{height: 64, width: 64, objectFit: "contain"}} />
              <span style={{fontFamily: "Outfit, sans-serif", fontWeight: 800, fontSize: "2.8rem", letterSpacing: "3px", lineHeight: "1"}}>SOLVIX PRO</span>
            </span>
            <div style={{width:1, height:20, background:"var(--border-color)"}}></div>
            <span style={{fontSize:15, fontWeight:600, color:"var(--text-secondary)", letterSpacing:"0.05em"}}>GERADOR DE REGRAS LSP</span>
        </div>

        <a href="/consultoria/dashboard.html" style={{marginLeft:"auto", textDecoration:"none", color:"var(--text-secondary)", display:"flex", alignItems:"center", gap:8, fontSize:13, fontWeight:500, transition:"0.2s"}} onMouseOver={e=>e.currentTarget.style.color="var(--text-primary)"} onMouseOut={e=>e.currentTarget.style.color="var(--text-secondary)"}>
           Voltar <span>→</span>
        </a>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"28px 24px"}}>

        {/* Mode Toggle */}
        <div style={{display:"flex",gap:4,marginBottom:16,background:"rgba(255,255,255,0.03)",border:"1px solid var(--border-color)",borderRadius:12,padding:4,width:"fit-content",backdropFilter:"blur(12px)"}}>
          {[{k:"text",i:"✏",l:"TEXTO"},{k:"image",i:"🖼",l:"PRINT DE TELA"}].map(m=>(
            <button key={m.k} onClick={()=>setMode(m.k)} style={{padding:"7px 16px",borderRadius:8,border:"none",background:mode===m.k?"rgba(255,255,255,0.1)":"transparent",color:mode===m.k?"var(--text-primary)":"var(--text-secondary)",fontSize:12,fontFamily:"inherit",letterSpacing:"0.05em",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontWeight:mode===m.k?600:400,transition:"0.2s"}}>
              {m.i} {m.l}
            </button>
          ))}
        </div>

        {/* Input Card */}
        <div style={{background:"rgba(17, 17, 22, 0.6)",backdropFilter:"blur(12px)",border:"1px solid var(--border-color)",borderRadius:12,overflow:"hidden",marginBottom:20}}>
          <div style={{padding:"12px 20px",background:"rgba(255,255,255,0.02)",borderBottom:"1px solid var(--border-color)",fontSize:12,color:"var(--text-secondary)",letterSpacing:"0.05em",display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:"var(--accent-color)"}}>▶</span>
            {mode==="image"?"UPLOAD DO PRINT + DESCRIÇÃO DO QUE DESEJA":"DESCREVA SUA NECESSIDADE"}
            <span style={{marginLeft:"auto",color:"var(--text-secondary)",opacity:0.5}}>Ctrl+Enter para gerar</span>
          </div>

          {/* Drop Zone */}
          {mode==="image"&&(
            <div
              onDragOver={e=>{e.preventDefault();setDragOver(true);}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={e=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0]);}}
              onClick={()=>!image&&fileRef.current?.click()}
              style={{margin:20,borderRadius:12,border:`2px dashed ${dragOver?"var(--accent-color)":"var(--border-color)"}`,background:dragOver?"rgba(59, 130, 246, 0.05)":"transparent",transition:"all .2s",cursor:image?"default":"pointer",overflow:"hidden"}}
            >
              {image?(
                <div style={{position:"relative"}}>
                  <img src={image.preview} alt="" style={{width:"100%",maxHeight:240,objectFit:"contain",display:"block",background:"#000"}}/>
                  <button onClick={e=>{e.stopPropagation();setImage(null);}} style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(4px)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,color:"#fff",fontSize:12,padding:"6px 12px",cursor:"pointer",fontFamily:"inherit"}}>✕ REMOVER</button>
                  <div style={{padding:"10px 16px",background:"rgba(0,0,0,0.5)",position:"absolute",bottom:0,width:"100%",backdropFilter:"blur(4px)",fontSize:12,color:"#fff"}}>📎 {image.file.name} · {(image.file.size/1024).toFixed(0)} KB</div>
                </div>
              ):(
                <div style={{padding:28,textAlign:"center",color:"#334155"}}>
                  <div style={{fontSize:28,marginBottom:8}}>🖼</div>
                  <div style={{fontSize:12,marginBottom:4,color:"#475569"}}>Arraste um print da tela Senior aqui</div>
                  <div style={{fontSize:11}}>ou clique para selecionar · PNG, JPG, JPEG</div>
                </div>
              )}
            </div>
          )}
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>

          <textarea
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&(e.ctrlKey||e.metaKey))generate();}}
            placeholder={mode==="image"?"Ex: Quero validar o campo Qtde antes de salvar, bloqueando se for zero...":"Ex: Quero uma regra que ao apontar uma OP verifique se o operador tem permissão e registre um log..."}
            style={{width:"100%",minHeight:100,background:"transparent",border:"none",outline:"none",padding:"20px",color:"var(--text-primary)",fontSize:14,fontFamily:"inherit",resize:"vertical",lineHeight:1.6,boxSizing:"border-box"}}
          />

          <div style={{padding:"16px 20px",borderTop:"1px solid var(--border-color)",background:"rgba(255,255,255,0.02)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            {mode==="image"&&(
              <button onClick={()=>fileRef.current?.click()} style={{background:"rgba(255,255,255,0.05)",border:"1px solid var(--border-color)",borderRadius:8,padding:"8px 16px",color:"var(--text-secondary)",fontSize:12,fontFamily:"inherit",cursor:"pointer",transition:"0.2s"}}>
                📎 {image?"TROCAR IMAGEM":"SELECIONAR IMAGEM"}
              </button>
            )}
            <button onClick={generate} disabled={!ok} className={!ok ? "disabled-btn" : "btn-primary"} style={{border:"none",borderRadius:50,padding:"10px 24px",fontSize:13,fontFamily:"inherit",fontWeight:600,cursor:!ok?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:8,marginLeft:"auto",background:!ok?"var(--surface-color)":"var(--gradient-primary)",color:!ok?"var(--text-secondary)":"#fff",boxShadow:!ok?"none":"0 4px 15px var(--accent-glow)"}}>
              {loading?<><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span>GERANDO...</>:mode==="image"?"🖼 ANALISAR E GERAR":"⚡ GERAR REGRA"}
            </button>
          </div>
        </div>

        {/* Error */}
        {error&&<div style={{background:"#1a0a0a",border:"1px solid #7f1d1d",borderRadius:6,padding:"12px 16px",color:"#fca5a5",fontSize:12,marginBottom:16,wordBreak:"break-word"}}>⚠ {error}</div>}

        {/* Result */}
        {result&&(
          <>
            <div style={{background:"rgba(17, 17, 22, 0.6)",backdropFilter:"blur(12px)",border:"1px solid var(--border-color)",borderRadius:12,padding:"20px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
              {[{label:"TÍTULO",value:result.titulo,color:"var(--text-primary)"},{label:"MÓDULO",value:result.modulo,color:"var(--accent-color)"},{label:"IDENTIFICADOR",value:result.identificador,color:"var(--text-secondary)"},{label:"DESCRIÇÃO",value:result.descricao,color:"var(--text-secondary)"}].map(({label,value,color})=>(
                <div key={label}><div style={{fontSize:11,color:"var(--text-secondary)",letterSpacing:"0.05em",marginBottom:6,fontWeight:500}}>{label}</div><div style={{fontSize:14,color,lineHeight:1.5}}>{value}</div></div>
              ))}
            </div>
            <div style={{background:"rgba(17, 17, 22, 0.6)",backdropFilter:"blur(12px)",border:"1px solid var(--border-color)",borderRadius:12,overflow:"hidden",boxShadow:"0 10px 30px rgba(0,0,0,0.3)"}}>
              <div style={{display:"flex",borderBottom:"1px solid var(--border-color)",background:"rgba(255,255,255,0.02)"}}>
                {[{k:"script",l:"📄 SCRIPT LSP"},{k:"variaveis",l:"🔤 VARIÁVEIS"},{k:"funcoes",l:"⚙ FUNÇÕES"},{k:"ajuda",l:"💡 AJUDA"}].map(t=>(
                  <button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"14px 18px",background:"transparent",border:"none",borderBottom:tab===t.k?"2px solid var(--accent-color)":"2px solid transparent",color:tab===t.k?"var(--text-primary)":"var(--text-secondary)",fontSize:11,fontFamily:"inherit",cursor:"pointer",fontWeight:tab===t.k?600:400,transition:"0.2s"}}>{t.l}</button>
                ))}
              </div>
              {tab==="script"&&(
                <div style={{position:"relative"}}>
                  <button onClick={copy} style={{position:"absolute",top:12,right:12,background:copied?"rgba(16, 185, 129, 0.1)":"rgba(255,255,255,0.05)",color:copied?"#10b981":"var(--text-secondary)",border:`1px solid ${copied?"rgba(16, 185, 129, 0.3)":"var(--border-color)"}`,borderRadius:8,padding:"6px 12px",fontSize:11,fontFamily:"inherit",cursor:"pointer",zIndex:10,backdropFilter:"blur(4px)",transition:"0.2s"}}>{copied?"✓ COPIADO":"⎘ COPIAR"}</button>
                  <pre style={{margin:0,padding:"20px 16px",fontSize:13,lineHeight:1.7,overflowX:"auto",whiteSpace:"pre-wrap",wordBreak:"break-word",fontFamily:"'Courier New',monospace",background:"transparent"}}>
                    {(result.script||"").split("\n").map((line,i)=>(
                      <span key={i} style={{color:lc(line),fontStyle:line.trim().startsWith("@")?"italic":"normal",display:"block"}}>
                        <span style={{color:"#334155",userSelect:"none",marginRight:12,fontSize:10}}>{String(i+1).padStart(2,"0")}</span>{line}
                      </span>
                    ))}
                  </pre>
                </div>
              )}
              {tab==="variaveis"&&(
                <div style={{padding:16}}>
                  {result.variaveis?.length>0?(
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                      <thead><tr style={{borderBottom:"1px solid var(--border-color)"}}>{["VARIÁVEL","TIPO","DESCRIÇÃO"].map(h=><th key={h} style={{padding:"12px",textAlign:"left",color:"var(--text-secondary)",fontSize:11,letterSpacing:"0.05em"}}>{h}</th>)}</tr></thead>
                      <tbody>{result.variaveis.map((v,i)=>(
                        <tr key={i} style={{borderBottom:"1px solid rgba(255,255,255,0.02)"}}>
                          <td style={{padding:"12px",color:"var(--accent-color)",fontFamily:"monospace"}}>{v.nome}</td>
                          <td style={{padding:"12px"}}><span style={{background:v.tipo==="Alfa"?"rgba(59, 130, 246, 0.1)":v.tipo==="Numero"?"rgba(16, 185, 129, 0.1)":"rgba(239, 68, 68, 0.1)",color:v.tipo==="Alfa"?"#3b82f6":v.tipo==="Numero"?"#10b981":"#ef4444",padding:"4px 10px",borderRadius:6,fontSize:11}}>{v.tipo}</span></td>
                          <td style={{padding:"12px",color:"var(--text-secondary)"}}>{v.descricao}</td>
                        </tr>
                      ))}</tbody>
                    </table>
                  ):<div style={{color:"var(--text-secondary)",fontSize:13,textAlign:"center",padding:40}}>Nenhuma variável documentada.</div>}
                </div>
              )}
              {tab==="funcoes"&&(
                <div style={{padding:20,display:"flex",flexDirection:"column",gap:12}}>
                  {(result.funcoes||[]).map((f,i)=>(
                    <div key={i} style={{background:"rgba(255,255,255,0.02)",border:"1px solid var(--border-color)",borderRadius:10,padding:"16px",display:"flex",gap:16}}>
                      <span style={{color:"var(--accent-color)",fontSize:13,fontFamily:"monospace",minWidth:180,fontWeight:600}}>{f.nome}()</span>
                      <span style={{color:"var(--text-secondary)",fontSize:13,lineHeight:1.6}}>{f.descricao}</span>
                    </div>
                  ))}
                </div>
              )}
              {tab==="ajuda"&&(
                <div style={{padding:24}}>
                  {result.atencao&&<div style={{background:"rgba(239, 68, 68, 0.1)",border:"1px solid rgba(239, 68, 68, 0.3)",borderRadius:12,padding:"16px",marginBottom:24,display:"flex",gap:12}}><span>⚠</span><div><div style={{fontSize:11,color:"#ef4444",letterSpacing:"0.05em",marginBottom:4}}>ATENÇÃO</div><div style={{fontSize:13,color:"#fca5a5",lineHeight:1.6}}>{result.atencao}</div></div></div>}
                  <div style={{fontSize:11,color:"var(--text-secondary)",letterSpacing:"0.05em",marginBottom:16,fontWeight:500}}>DICAS DE USO</div>
                  <div style={{display:"flex",flexDirection:"column",gap:12}}>
                    {(result.dicas||[]).map((d,i)=>(
                      <div key={i} style={{background:"rgba(255,255,255,0.02)",border:"1px solid var(--border-color)",borderRadius:12,padding:"16px",fontSize:13,color:"var(--text-secondary)",lineHeight:1.6,display:"flex",gap:12}}>
                        <span style={{color:"var(--accent-color)",minWidth:16,fontWeight:600}}>{i+1}.</span>{d}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </>
        )}

        {!result&&!loading&&!error&&(
          <div style={{textAlign:"center",padding:"60px 24px"}}>
            <div style={{fontSize:40,marginBottom:16,opacity:.3,color:"var(--text-secondary)"}}>{mode==="image"?"🖼":"⌨"}</div>
            <div style={{fontSize:14,lineHeight:1.6,maxWidth:420,margin:"0 auto",color:"var(--text-secondary)"}}>
              {mode==="image"
                ?"Faça upload de um print da tela do Senior e descreva o que deseja customizar. O sistema irá analisar os campos visíveis e gerar a regra LSP automaticamente usando o Gemini."
                :<>Digite uma descrição ou mude para <strong style={{color:"var(--accent-color)"}}>PRINT DE TELA</strong> para gerar regras a partir de capturas de tela do Senior.</>}
            </div>
          </div>
        )}
      </div>

      <style>{`@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}textarea::placeholder{color:rgba(255,255,255,0.3);}*{box-sizing:border-box;}::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:var(--bg-color);}::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:3px;}`}</style>
    </div>
  );
}

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
