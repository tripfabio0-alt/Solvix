<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solvix Pro - Engenharia Senior</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #05050a;
            --card: #0d0d1a;
            --border: #1e1e2d;
            --primary: #6366f1;
            --accent: #10b981;
            --text: #ffffff;
            --muted: #8b949e;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, .logo-text { font-family: 'Outfit', sans-serif; }

        .navbar {
            height: 72px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(5, 5, 10, 0.8);
            backdrop-blur: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 800; font-size: 24px; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; color: #fff; text-decoration: none; }
        .logo span { color: var(--accent); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; flex: 1; }

        .input-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .input-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }

        .label { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; letter-spacing: 1px; }

        textarea {
            width: 100%;
            height: 100px;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 18px;
            resize: none;
            outline: none;
            padding: 0;
            margin-top: 10px;
            font-weight: 300;
        }

        .actions { display: flex; justify-content: flex-end; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 24px; }

        .btn-generate {
            background: var(--accent);
            color: #05050a;
            border: none;
            padding: 14px 36px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            font-size: 13px;
        }

        .btn-generate:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4); background: #0ee49b; }
        .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; display: none; }
        @media (max-width: 900px) { .results-grid { grid-template-columns: 1fr; } }

        .result-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .result-header { padding: 20px 24px; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .result-body { padding: 24px; flex: 1; font-size: 15px; }

        pre { margin: 0; white-space: pre-wrap; font-family: 'Fira Code', monospace; color: #a5d6ff; line-height: 1.6; }
        .explanation-text { color: var(--muted); white-space: pre-wrap; font-weight: 400; }

        .btn-copy {
            background: rgba(255,255,255,0.05);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer {
            padding: 40px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            background: var(--bg);
            margin-top: 60px;
        }

        .footer-logo { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 18px; color: var(--muted); }
        .loading-shimmer { height: 200px; background: linear-gradient(90deg, var(--card) 25%, #1e1e2d 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 20px; display: none; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .error-toast { background: #450a0a; border: 1px solid #991b1b; color: #fecaca; padding: 16px 24px; border-radius: 12px; margin-bottom: 24px; display: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">SOLVIX<span>PRO</span></a>
        <div style="display: flex; gap: 20px; align-items: center;">
            <a href="/app/dashboard" style="color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500;">Painel</a>
            <button onclick="logout()" style="background: none; border: none; color: #f87171; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px;">
                <i data-lucide="log-out" style="width: 14px;"></i> Sair
            </button>
            <div style="width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(45deg, var(--primary), var(--accent));"></div>
        </div>
    </nav>

    <div class="container">
        <div class="error-toast" id="error-toast"></div>
        <div class="input-section">
            <div class="label"><i data-lucide="zap"></i> Requisitar Inteligência de Engenharia</div>
            <textarea id="prompt" placeholder="Descreva a regra de negócio ou lógica LSP desejada..."></textarea>
            <div class="actions">
                <button id="generate-btn" class="btn-generate"><i data-lucide="sparkles"></i> Gerar Solução Sênior</button>
            </div>
        </div>
        <div id="loading" class="loading-shimmer"></div>
        <div id="results-grid" class="results-grid">
            <div class="result-card">
                <div class="result-header"><div class="label" style="margin:0; color: var(--primary);"><i data-lucide="info"></i> Análise de Arquitetura</div></div>
                <div class="result-body"><div id="explanation" class="explanation-text"></div></div>
            </div>
            <div class="result-card" style="border-color: rgba(16, 185, 129, 0.3);">
                <div class="result-header">
                    <div class="label" style="margin:0;"><i data-lucide="terminal"></i> Código Senior (LSP)</div>
                    <button class="btn-copy" onclick="copyCode()"><i data-lucide="copy"></i> Copiar Código</button>
                </div>
                <div class="result-body" style="background: #010409;"><pre id="code-content"></pre></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-logo">SOLVIX<span>PRO</span></div>
        <div style="color: #4b5563; font-size: 12px; margin-top: 10px;">© 2026 Solvix AI Solutions. Tecnologia de Ponta para Ecossistema Senior.</div>
    </footer>

    <script>
        lucide.createIcons();
        function logout() {
            localStorage.removeItem('google_authenticated');
            localStorage.removeItem('user_role');
            window.location.href = '/';
        }
        
        const btn = document.getElementById('generate-btn');
        const promptInput = document.getElementById('prompt');
        const resultsGrid = document.getElementById('results-grid');
        const loading = document.getElementById('loading');
        const errorToast = document.getElementById('error-toast');
        const explanationDiv = document.getElementById('explanation');
        const codePre = document.getElementById('code-content');

        btn.addEventListener('click', async () => {
            const text = promptInput.value.trim();
            if (!text) return;
            btn.disabled = true;
            loading.style.display = "block";
            resultsGrid.style.display = "none";
            errorToast.style.display = "none";
            try {
                const response = await fetch('/api/gerar-sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                if (!response.ok) { const err = await response.json(); throw new Error(err.error || 'Erro'); }
                const data = await response.json();
                const raw = data.resultado;
                const getTag = (tag) => {
                    const s = raw.indexOf("##" + tag + "##");
                    if (s === -1) return "";
                    const after = s + tag.length + 4;
                    const e = raw.indexOf("##", after);
                    return (e === -1 ? raw.slice(after) : raw.slice(after, e)).trim();
                };
                const explanation = getTag("EXPLICACOES");
                const code = getTag("CONTEUDO");
                if (!code && !explanation) { explanationDiv.innerText = "IA Response"; codePre.innerText = raw; }
                else { explanationDiv.innerText = explanation; codePre.innerText = code; }
                loading.style.display = "none";
                resultsGrid.style.display = "grid";
            } catch (err) {
                loading.style.display = "none";
                errorToast.innerText = "Erro: " + err.message;
                errorToast.style.display = "block";
            } finally { btn.disabled = false; }
        });

        function copyCode() {
            navigator.clipboard.writeText(codePre.innerText);
            alert("Código copiado!");
        }
    </script>
</body>
</html>
